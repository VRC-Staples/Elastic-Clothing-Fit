name: CI

on:
  push:
    branches-ignore:
      - dev
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev tools
        run: pip install ruff pytest
      - name: Lint — ruff
        run: ruff check elastic_fit/ tests/ tools/
      - name: Pytest
        run: pytest tests/
      - name: Static analysis — updater thread safety
        run: python tests/verify_updater.py
