name: Stable Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      hotfix:
        type: boolean
        default: false
        description: "Rebuild and overwrite release at current version (artifact fix only -- does not bump version)"

jobs:

  setup:
    name: Version Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_release: ${{ steps.decide.outputs.should_release }}
      create_tag: ${{ steps.decide.outputs.create_tag }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Restore dev tooling from dev
        run: |
          git fetch origin dev
          git checkout origin/dev -- tools/ tests/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve version
        id: resolve
        run: |
          VERSION=$(python tools/deploy.py meta --field version)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not resolve version from bl_info"
            exit 1
          fi
          HEAD_SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved version $VERSION at $HEAD_SHA"

      - name: Decide if we should release
        id: decide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.resolve.outputs.version }}
          IS_HOTFIX: "${{ inputs.hotfix || 'false' }}"
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import socket
          import sys
          import urllib.error
          import urllib.request

          is_hotfix = os.environ.get("IS_HOTFIX", "false").strip().lower() == "true"
          version   = os.environ.get("VERSION", "").strip()
          repo      = os.environ.get("GITHUB_REPOSITORY", "").strip()
          token     = os.environ.get("GITHUB_TOKEN", "").strip()
          output    = os.environ["GITHUB_OUTPUT"]

          if is_hotfix:
              print("::notice::Hotfix mode — overwriting artifacts for current version.")
              with open(output, "a") as fh:
                  print("should_release=true", file=fh)
                  print("create_tag=false", file=fh)
              sys.exit(0)

          try:
              version_parts = tuple(int(p) for p in version.split("."))
          except ValueError:
              raise SystemExit(f"Invalid version: {version}")

          url = f"https://api.github.com/repos/{repo}/releases/latest"
          req = urllib.request.Request(url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          })

          latest_parts = ()
          latest_version = ""
          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  data = json.loads(resp.read().decode("utf-8"))
              tag_name = data.get("tag_name", "").strip()
              m = re.match(r"^v?(\d+(?:\.\d+)*)$", tag_name)
              if m:
                  latest_version = tag_name
                  latest_parts = tuple(int(p) for p in m.group(1).split("."))
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print("::notice::No existing releases found — will create first release.")
              else:
                  details = exc.read().decode("utf-8", errors="replace")
                  print(f"::error::GitHub API HTTP {exc.code}: {details[:400]}")
                  sys.exit(1)
          except (urllib.error.URLError, socket.timeout, TimeoutError) as exc:
              print(f"::error::GitHub API error: {exc}")
              sys.exit(1)

          def normalize(parts, length):
              return parts + (0,) * (length - len(parts))

          should_release = False
          create_tag     = False

          if not latest_parts:
              should_release = True
              create_tag     = True
          else:
              max_len = max(len(version_parts), len(latest_parts))
              v = normalize(version_parts, max_len)
              l = normalize(latest_parts,  max_len)
              if v > l:
                  should_release = True
                  create_tag     = True
              else:
                  print(f"::notice::Version {version} is not newer than latest release {latest_version}. Skipping.")

          with open(output, "a") as fh:
              print(f"should_release={'true' if should_release else 'false'}", file=fh)
              print(f"create_tag={'true' if create_tag else 'false'}", file=fh)

          if should_release:
              print(f"::notice::Will release version {version} (create_tag={create_tag})")
          PY

  build:
    name: Build & Publish
    needs: [setup]
    if: needs.setup.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.head_sha }}
          fetch-depth: 0

      - name: Restore dev tooling from dev
        run: |
          git fetch origin dev
          git checkout origin/dev -- tools/ tests/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build release zip
        run: |
          python tools/deploy.py build --skip-test
          ZIP=$(ls ElasticClothingFit-v*.zip 2>/dev/null | grep -v nightly | head -1 || true)
          if [ -z "$ZIP" ]; then
            echo "::error::Expected release zip was not produced."
            exit 1
          fi
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Guard against duplicate tag
        if: needs.setup.outputs.create_tag == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.setup.outputs.version }}"
          http_status=$(curl -s -o /tmp/tag-check.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/git/ref/tags/${TAG}")
          if [ "$http_status" = "200" ]; then
            echo "::error::Tag $TAG already exists — release blocked to prevent overwrite."
            exit 1
          fi
          if [ "$http_status" != "404" ]; then
            echo "::error::Unexpected HTTP $http_status checking tag $TAG."
            exit 1
          fi

      - name: Read BLENDER_MIN and compute SHA-256
        id: meta
        run: |
          BLENDER_MIN=$(python tools/deploy.py meta --field blender-min)
          SHA=$(sha256sum "$ZIP" | awk '{print $1}')
          echo "BLENDER_MIN=$BLENDER_MIN" >> "$GITHUB_OUTPUT"
          echo "SHA256=$SHA"              >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: needs.setup.outputs.create_tag == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.setup.outputs.version }}"
          gh api --method POST /repos/${{ github.repository }}/git/refs \
            -f "ref=refs/tags/$TAG" \
            -f "sha=${{ needs.setup.outputs.head_sha }}"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.setup.outputs.version }}"
          BLENDER_MIN="${{ steps.meta.outputs.BLENDER_MIN }}"
          SHA256="${{ steps.meta.outputs.SHA256 }}"

          NOTES=$(printf '## %s\n\n### Installation\n1. Download `%s`\n2. In Blender: Edit → Preferences → Add-ons → Install → select the zip\n3. Enable **.Staples. Elastic Clothing Fit**\n\n### Verification\n```\nSHA256: %s\n```\n\nBLENDER_MIN=%s' \
            "$TAG" "$ZIP" "$SHA256" "$BLENDER_MIN")

          gh release create "$TAG" "$ZIP" \
            --title "$TAG" \
            --notes "$NOTES"
